name: Deploy to IONOS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inject API key into proxy.php
        run: sed -i "s/%%ANTHROPIC_API_KEY%%/${{ secrets.ANTHROPIC_API_KEY }}/" proxy.php

      - name: Add proxy to build output
        run: cp proxy.php out/proxy.php

      - name: Deploy via SFTP
        env:
          SFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }}","$SFTP_PASSWORD" \
               -e "set sftp:auto-confirm yes; mirror -R --delete --verbose ./dist/ httpdocs/chatdemo/; quit" \
               sftp://access-5020765337.webspace-host.com:22

